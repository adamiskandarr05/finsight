services:
  - type: web
    name: finsight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir app server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # You will paste this manually in the Render dashboard
      - key: FLASK_ENV
        value: production
